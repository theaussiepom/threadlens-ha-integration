name: Feature request
description: Suggest an improvement for the ThreadLens Home Assistant integration
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests for dashboard polish, new entities, or HACS packaging are welcome.
        ThreadLens Core collector changes belong in the core repo.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dashboard panel
        - Backend / websocket
        - Entities / automations
        - HACS / packaging
        - Documentation
        - Other
    validations:
      required: true
