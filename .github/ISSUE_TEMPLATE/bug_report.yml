name: Bug report
description: Report a problem with the ThreadLens Home Assistant integration
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please do not include secrets, passwords, or private LAN details.

  - type: input
    id: version
    attributes:
      label: Integration version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: "2024.x.x"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Install via HACS
        2. Configure ThreadLens URL
        3. Open sidebar panel
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Config flow
        - Dashboard panel
        - Websocket / API
        - Entities
        - HACS install
        - Other
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Redact URLs, tokens, and hostnames if needed.
      render: shell
